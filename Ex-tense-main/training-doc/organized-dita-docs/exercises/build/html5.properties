# ============================================================
# html5.properties — Lab sample build properties
#
# Use with:
#   dita -i lab-sample.ditamap -f html5 -o out/html5 \
#     --propertyfile=build/html5.properties
# ============================================================

# Navigation
nav-toc = full

# CSS
args.copycss     = yes
args.cssroot     = plugins/com.extense.html5.labs/css/
args.css         = brand.css

# Output quality
processing-mode  = strict
generate-debug-attributes = yes
