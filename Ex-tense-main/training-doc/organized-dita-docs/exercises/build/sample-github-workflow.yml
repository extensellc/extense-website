# ============================================================
# GitHub Actions CI workflow — Lab 5 reference sample
#
# This workflow builds DITA HTML5 output on every push and PR.
# Copy this to .github/workflows/docs.yml in your project.
# ============================================================

name: DITA Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build HTML5
        uses: dita-ot/dita-ot-action@master
        with:
          input: lab-sample.ditamap
          transtype: html5
          output-path: out/html5
          # Uncomment to install your custom plug-in:
          # install: |
          #   plugins/com.extense.html5.labs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: html5-output
          path: out/html5

      - name: Verify output
        run: |
          test -f out/html5/index.html || (echo "ERROR: index.html not found" && exit 1)
          echo "✓ Build produced index.html"
          find out/html5 -name '*.html' | wc -l | xargs -I{} echo "✓ {} HTML files generated"
