# DITA-OT HTML5 Sidebar TOC + Chunking starter config

# Embed a full TOC <nav> inside every topic page (sidebar)
nav-toc=full

# Generate the HTML5 index TOC file
html5.toc.generate=yes

# Include DITA @class in output (useful for debugging / CSS hooks)
args.html5.classattr=yes

# Copy custom CSS
args.copycss=yes
args.cssroot=css/
args.css=brand.css

# Filtering (DITAVAL)
# Web variant: exclude platform=print
args.filter=build/ditaval/web.ditaval
