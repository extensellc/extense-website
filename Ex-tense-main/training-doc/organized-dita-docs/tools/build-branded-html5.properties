# ============================================================
# Extense LLC — Branded HTML5 Build Properties
# 
# Usage:
#   dita -i dita-training-guide.ditamap \
#        -f html5 \
#        -o output/html5-branded \
#        --propertyfile=build-branded-html5.properties
# ============================================================

# Navigation — full sidebar TOC
nav-toc = full

# Copy CSS to output
args.copycss = yes
args.cssroot = ${dita.plugin.com.extense.html5.branded.dir}/css/
args.css = brand.css

# Include class attributes on elements
args.html5.classattr = yes

# Include draft content (set to no for production)
args.draft = no

# Generate navigation links (next/previous)
args.rellinks = all

# Outer control — generate output for all files
outer.control = quiet
generate.copy.outer = 3

# Chunk by topic for sidebar nav
# (use default chunking from the ditamap itself)

# HTML5 specific
args.html5.toc = index
