<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D397C"/>
      <stop offset="100%" stop-color="#0f2350"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="80" x2="400" y2="80"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="240" x2="400" y2="240"/><line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="80" y1="0" x2="80" y2="400"/><line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
  </g>

  <!-- EXACT logo mark from website: two overlapping STROKED squares + connecting line + open circle -->
  <g transform="translate(117, 68) scale(1.15)">
    <!-- Outer square (top-right) -->
    <rect x="60" y="10" width="110" height="110" rx="4" fill="none" stroke="#E9AC15" stroke-width="5"/>
    <!-- Inner square (bottom-left, overlapping) -->
    <rect x="30" y="60" width="100" height="100" rx="4" fill="none" stroke="#E9AC15" stroke-width="5"/>
    <!-- Connecting line going up from outer square top-right -->
    <line x1="170" y1="10" x2="170" y2="0" stroke="#E9AC15" stroke-width="5" stroke-linecap="round"/>
    <!-- Open circle at top of connecting line -->
    <circle cx="170" cy="0" r="6" fill="none" stroke="#E9AC15" stroke-width="4"/>
  </g>

  <!-- Company name -->
  <text x="200" y="260" text-anchor="middle" font-family="'Montserrat','Helvetica Neue',Arial,sans-serif" font-weight="300" font-size="38" fill="white" letter-spacing="6">EXTENSE</text>
  <!-- Tagline -->
  <text x="200" y="295" text-anchor="middle" font-family="'Questrial','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="13" fill="#81AFCB" letter-spacing="3">STRATEGIC XML SOLUTIONS</text>
  <!-- Divider -->
  <rect x="120" y="315" width="160" height="1" fill="#E9AC15" opacity="0.5"/>
  <!-- Certifications -->
  <text x="200" y="345" text-anchor="middle" font-family="'Questrial','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#81AFCB" letter-spacing="2" opacity="0.7">8(a) CERTIFIED • WOMAN-OWNED • MINORITY-OWNED</text>
</svg>
