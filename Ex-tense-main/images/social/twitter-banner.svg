<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="bg-tw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D397C"/>
      <stop offset="100%" stop-color="#0f2350"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg-tw)"/>
  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="125" x2="1500" y2="125"/><line x1="0" y1="250" x2="1500" y2="250"/>
    <line x1="0" y1="375" x2="1500" y2="375"/>
    <line x1="300" y1="0" x2="300" y2="500"/><line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="900" y1="0" x2="900" y2="500"/><line x1="1200" y1="0" x2="1200" y2="500"/>
  </g>
  <!-- Decorative ghost squares (outline style matching logo) -->
  <rect x="90" y="110" width="120" height="120" rx="6" fill="none" stroke="#E9AC15" stroke-width="1.5" opacity="0.08"/>
  <rect x="155" y="160" width="110" height="110" rx="6" fill="none" stroke="#E9AC15" stroke-width="1.5" opacity="0.05"/>
  <rect x="1290" y="250" width="95" height="95" rx="5" fill="none" stroke="#4682B4" stroke-width="1.5" opacity="0.08"/>
  <rect x="1340" y="285" width="87" height="87" rx="5" fill="none" stroke="#4682B4" stroke-width="1.5" opacity="0.05"/>
  <!-- Gold left accent -->
  <rect x="0" y="0" width="5" height="500" fill="#E9AC15"/>

  <!-- EXACT logo mark from website -->
  <g transform="translate(425, 100) scale(0.8)">
    <!-- Outer square (top-right) -->
    <rect x="60" y="10" width="110" height="110" rx="4" fill="none" stroke="#E9AC15" stroke-width="5"/>
    <!-- Inner square (bottom-left, overlapping) -->
    <rect x="30" y="60" width="100" height="100" rx="4" fill="none" stroke="#E9AC15" stroke-width="5"/>
    <!-- Connecting line going up -->
    <line x1="170" y1="10" x2="170" y2="0" stroke="#E9AC15" stroke-width="5" stroke-linecap="round"/>
    <!-- Open circle at top -->
    <circle cx="170" cy="0" r="6" fill="none" stroke="#E9AC15" stroke-width="4"/>
  </g>

  <!-- Company name -->
  <text x="570" y="157" font-family="'Montserrat','Helvetica Neue',Arial,sans-serif" font-weight="300" font-size="56" fill="white" letter-spacing="8">EXTENSE</text>
  <!-- Tagline -->
  <text x="570" y="210" font-family="'Questrial','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="22" fill="#81AFCB" letter-spacing="2">Harnessing the Power of XML to Transform Your Organization</text>
  <!-- Divider -->
  <rect x="570" y="233" width="280" height="2" fill="#E9AC15" opacity="0.5"/>
  <!-- Services -->
  <text x="570" y="277" font-family="'Questrial','Helvetica Neue',Arial,sans-serif" font-size="17" fill="rgba(255,255,255,0.6)" letter-spacing="1.5">Content Engineering • CCMS • Publishing Solutions • DITA XML</text>
  <!-- Certs -->
  <text x="570" y="325" font-family="'Montserrat','Helvetica Neue',Arial,sans-serif" font-weight="500" font-size="13" fill="#0ACB8B" letter-spacing="2">8(a) CERTIFIED  •  WOMAN-OWNED  •  MINORITY-OWNED</text>
  <!-- Website -->
  <text x="570" y="392" font-family="'Montserrat','Helvetica Neue',Arial,sans-serif" font-weight="500" font-size="15" fill="rgba(255,255,255,0.35)" letter-spacing="3">WWW.EX-TENSE.CO</text>
  <!-- Bottom accent -->
  <rect x="0" y="492" width="1500" height="8" fill="#E9AC15" opacity="0.7"/>
</svg>
