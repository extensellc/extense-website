<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <linearGradient id="bg-banner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D397C"/>
      <stop offset="100%" stop-color="#0f2350"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bg-banner)"/>
  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="99" x2="1584" y2="99"/><line x1="0" y1="198" x2="1584" y2="198"/>
    <line x1="0" y1="297" x2="1584" y2="297"/>
    <line x1="264" y1="0" x2="264" y2="396"/><line x1="528" y1="0" x2="528" y2="396"/>
    <line x1="792" y1="0" x2="792" y2="396"/><line x1="1056" y1="0" x2="1056" y2="396"/>
    <line x1="1320" y1="0" x2="1320" y2="396"/>
  </g>
  <!-- Decorative ghost squares (outline style matching logo) -->
  <rect x="110" y="80" width="110" height="110" rx="6" fill="none" stroke="#E9AC15" stroke-width="1.5" opacity="0.08"/>
  <rect x="165" y="120" width="100" height="100" rx="6" fill="none" stroke="#E9AC15" stroke-width="1.5" opacity="0.05"/>
  <rect x="1350" y="190" width="85" height="85" rx="5" fill="none" stroke="#4682B4" stroke-width="1.5" opacity="0.08"/>
  <rect x="1395" y="220" width="77" height="77" rx="5" fill="none" stroke="#4682B4" stroke-width="1.5" opacity="0.05"/>
  <!-- Gold left accent -->
  <rect x="0" y="0" width="5" height="396" fill="#E9AC15"/>

  <!-- EXACT logo mark from website -->
  <g transform="translate(390, 65) scale(0.9)">
    <!-- Outer square (top-right) -->
    <rect x="60" y="10" width="110" height="110" rx="4" fill="none" stroke="#E9AC15" stroke-width="5"/>
    <!-- Inner square (bottom-left, overlapping) -->
    <rect x="30" y="60" width="100" height="100" rx="4" fill="none" stroke="#E9AC15" stroke-width="5"/>
    <!-- Connecting line going up -->
    <line x1="170" y1="10" x2="170" y2="0" stroke="#E9AC15" stroke-width="5" stroke-linecap="round"/>
    <!-- Open circle at top -->
    <circle cx="170" cy="0" r="6" fill="none" stroke="#E9AC15" stroke-width="4"/>
  </g>

  <!-- Company name -->
  <text x="580" y="130" font-family="'Montserrat','Helvetica Neue',Arial,sans-serif" font-weight="300" font-size="66" fill="white" letter-spacing="9">EXTENSE</text>
  <!-- Tagline -->
  <text x="580" y="185" font-family="'Questrial','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="28" fill="#81AFCB" letter-spacing="2">Harnessing the Power of XML to Transform Your Organization</text>
  <!-- Divider -->
  <rect x="580" y="210" width="300" height="2" fill="#E9AC15" opacity="0.5"/>
  <!-- Services -->
  <text x="580" y="252" font-family="'Questrial','Helvetica Neue',Arial,sans-serif" font-size="20" fill="rgba(255,255,255,0.6)" letter-spacing="1.5">Content Engineering • CCMS • Publishing Solutions • DITA XML</text>
  <!-- Certs -->
  <text x="580" y="300" font-family="'Montserrat','Helvetica Neue',Arial,sans-serif" font-weight="500" font-size="16" fill="#0ACB8B" letter-spacing="2">8(a) CERTIFIED  •  WOMAN-OWNED  •  MINORITY-OWNED</text>
  <!-- Bottom accent -->
  <rect x="0" y="388" width="1584" height="8" fill="#E9AC15" opacity="0.7"/>
</svg>
