<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 180">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@200&amp;display=swap');
      .wordmark {
        font-family: 'Montserrat ExtraLight', 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
        font-size: 150px;
        font-weight: 200;
        letter-spacing: 20px;
        fill: #000000;
      }
    </style>
    <linearGradient id="amberGradient" x1="15" y1="10" x2="155" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="50%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect x="45" y="10" width="110" height="110" rx="4" fill="none" stroke="url(#amberGradient)" stroke-width="5"/>
  <rect x="15" y="60" width="100" height="100" rx="4" fill="none" stroke="url(#amberGradient)" stroke-width="5"/>
  <text x="205" y="137" class="wordmark">EXTENSE</text>
</svg>
