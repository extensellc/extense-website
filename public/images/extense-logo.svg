<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 225">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@200&amp;display=swap');
      .wordmark {
        font-family: 'Montserrat ExtraLight', 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
        font-size: 30px;
        font-weight: 200;
        letter-spacing: 6px;
        fill: #000000;
      }
    </style>
    <!-- Glossy gradient: #fcd34d -> #fde047 (yellow shine) -> #f59e0b, to-br direction -->
    <linearGradient id="amberGradient" x1="30" y1="10" x2="170" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="50%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Outer square (top-right) -->
  <rect x="60" y="10" width="110" height="110" rx="4" fill="none" stroke="url(#amberGradient)" stroke-width="5"/>
  <!-- Inner square (bottom-left, overlapping) -->
  <rect x="30" y="60" width="100" height="100" rx="4" fill="none" stroke="url(#amberGradient)" stroke-width="5"/>
  <!-- EXTENSE wordmark -->
  <text x="100" y="210" text-anchor="middle" class="wordmark">EXTENSE</text>
</svg>
